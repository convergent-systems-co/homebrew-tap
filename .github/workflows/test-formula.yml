name: Test Formula

on:
  push:
    paths:
      - "Formula/**.rb"
  pull_request:
    paths:
      - "Formula/**.rb"
  workflow_dispatch:

jobs:
  test:
    name: brew test-bot
    runs-on: macos-latest
    env:
      # actions/cache@v4 ships on Node 20, which the runner forces to
      # Node 24 starting 2026-06-02. Opt in early so any breakage surfaces
      # in CI now rather than during the forced migration.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        uses: Homebrew/actions/setup-homebrew@main

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@v4
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ runner.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ runner.os }}-rubygems-

      - name: Install Homebrew Bundler RubyGems
        run: brew install-bundler-gems

      - name: Run brew test-bot --only-cleanup-before
        run: brew test-bot --only-cleanup-before

      - name: Run brew test-bot --only-setup
        run: brew test-bot --only-setup

      - name: Run brew style
        run: brew style convergent-systems-co/tap

      - name: Run brew audit (Formulae only, cross-platform)
        run: brew audit --formula --strict --tap=convergent-systems-co/tap

      - name: Run brew test-bot --only-formulae
        if: github.event_name == 'pull_request'
        run: brew test-bot --only-formulae

      - name: Run brew test-bot --only-cleanup-after
        if: always()
        run: brew test-bot --only-cleanup-after
