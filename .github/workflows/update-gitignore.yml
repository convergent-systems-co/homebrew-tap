name: Update gitignore Formula

on:
  repository_dispatch:
    types: [gitignore-release]
  schedule:
    # Daily fallback check at 08:00 UTC
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to update to (e.g. v1.4.0). Leave blank to use latest."
        required: false

jobs:
  update:
    name: Update gitignore formula
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout tap
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve target version
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            VERSION="${{ github.event.client_payload.version }}"
          elif [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=$(gh api repos/convergent-systems-co/gitignore/releases/latest --jq '.tag_name')
          fi
          # Normalise: strip leading 'v' for the formula, keep full tag for URLs
          TAG="${VERSION}"
          [[ "${TAG}" != v* ]] && TAG="v${TAG}"
          BARE="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "bare=${BARE}" >> "$GITHUB_OUTPUT"

      - name: Check if update is needed
        id: check
        run: |
          CURRENT=$(grep -oP '(?<=version ")[\d.]+' Formula/gitignore.rb | head -1)
          TARGET="${{ steps.version.outputs.bare }}"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          if [ "${CURRENT}" = "${TARGET}" ]; then
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Already at ${TARGET}, nothing to do."
          else
            echo "needed=true" >> "$GITHUB_OUTPUT"
            echo "Updating ${CURRENT} -> ${TARGET}"
          fi

      - name: Download macOS binaries and compute checksums
        if: steps.check.outputs.needed == 'true'
        id: shas
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          BARE="${{ steps.version.outputs.bare }}"
          BASE="https://github.com/convergent-systems-co/gitignore/releases/download/${TAG}"

          curl -fsSL "${BASE}/gitignore-${TAG}-darwin-amd64.tar.gz" -o amd64.tar.gz
          curl -fsSL "${BASE}/gitignore-${TAG}-darwin-arm64.tar.gz" -o arm64.tar.gz

          echo "amd64=$(sha256sum amd64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "arm64=$(sha256sum arm64.tar.gz | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Update formula file
        if: steps.check.outputs.needed == 'true'
        env:
          BARE: ${{ steps.version.outputs.bare }}
          SHA_AMD64: ${{ steps.shas.outputs.amd64 }}
          SHA_ARM64: ${{ steps.shas.outputs.arm64 }}
        run: |
          python3 - <<'EOF'
          import re, os

          path = "Formula/gitignore.rb"
          content = open(path).read()

          bare     = os.environ["BARE"]
          sha_amd  = os.environ["SHA_AMD64"]
          sha_arm  = os.environ["SHA_ARM64"]

          content = re.sub(r'version "[0-9.]+"', f'version "{bare}"', content)

          content = re.sub(
              r'(on_arm\s+do.*?sha256\s+")[0-9a-f]+"',
              rf'\g<1>{sha_arm}"',
              content, flags=re.DOTALL,
          )
          content = re.sub(
              r'(on_intel\s+do.*?sha256\s+")[0-9a-f]+"',
              rf'\g<1>{sha_amd}"',
              content, flags=re.DOTALL,
          )

          open(path, "w").write(content)
          print(f"Updated formula to {bare}")
          EOF

      - name: Commit and push
        if: steps.check.outputs.needed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/gitignore.rb
          git commit -m "chore: update gitignore to ${{ steps.version.outputs.tag }}"
          git push
